name: Build and deploy container app to Azure Web App

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Enable Docker buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Login to Azure Container Registry
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4️⃣ Build and push container
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_SERVER }}/my-churn-api:${{ github.sha }}
            ${{ secrets.ACR_SERVER }}/my-churn-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 1️⃣ Login to Azure using Service Principal
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2️⃣ Deploy container to Azure Web App
      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: my-churn-api-shraddha
          resource-group-name: my-churn-api-shraddha_group
          images: ${{ secrets.ACR_SERVER }}/my-churn-api:latest
          slot-name: Production
